services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: solar_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solar_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solar_erp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-solar_erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solar_erp} -d ${POSTGRES_DB:-solar_erp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solar_erp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Application ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: solar_erp_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-solar_erp}:${POSTGRES_PASSWORD:-solar_erp_secret}@db:5432/${POSTGRES_DB:-solar_erp_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app   # Hot-reload in development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
